name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test_js:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'

    - name: Install Monorepo Dependencies
      run: npm install

    - name: Run Prisma Code Generation
      run: |
        npx turbo run generate --filter=@carbon-dpi/registry --filter=@carbon-dpi/reference-node || true
        # Run generation inside packages if workspace command is not configured
        cd carbon-dpi-registry && npx prisma generate && cd ..
        cd carbon-dpi-reference-node && npx prisma generate && cd ..

    - name: Build All Workspaces
      run: npm run build

    - name: Run All Jest Test Suites
      run: npm run test

  python_sdk_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          cd carbon-dpi-sdk-python
          python -m pip install --upgrade pip
          pip install cryptography pytest
          
      - name: Run Python SDK Unit Tests
        run: |
          cd carbon-dpi-sdk-python
          pytest
