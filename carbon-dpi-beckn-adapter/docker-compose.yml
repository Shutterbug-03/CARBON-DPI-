version: "3.9"

services:
  carbon-dpi-beckn-adapter:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: carbon-dpi-beckn-adapter:latest
    container_name: carbon-dpi-beckn-adapter
    restart: unless-stopped
    ports:
      - "${PORT:-3002}:3002"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
